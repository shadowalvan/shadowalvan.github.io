<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="hooded figure avatar">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#0d2417"/>
      <stop offset="100%" stop-color="#03100a"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#04130b"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="100" cy="100" r="98" fill="url(#bgGrad)" stroke="#134a2c" stroke-width="2"/>

  <!-- faint scanlines -->
  <g opacity="0.12">
    <clipPath id="circleClip"><circle cx="100" cy="100" r="96"/></clipPath>
    <g clip-path="url(#circleClip)">
      <rect x="0" y="0" width="200" height="200" fill="transparent"/>
      <g stroke="#46ffa0" stroke-width="1">
        <line x1="0" y1="20" x2="200" y2="20"/><line x1="0" y1="40" x2="200" y2="40"/>
        <line x1="0" y1="60" x2="200" y2="60"/><line x1="0" y1="80" x2="200" y2="80"/>
        <line x1="0" y1="100" x2="200" y2="100"/><line x1="0" y1="120" x2="200" y2="120"/>
        <line x1="0" y1="140" x2="200" y2="140"/><line x1="0" y1="160" x2="200" y2="160"/>
        <line x1="0" y1="180" x2="200" y2="180"/>
      </g>
    </g>
  </g>

  <!-- hooded silhouette -->
  <path d="M38,196
           C38,148 48,114 76,100
           C70,86 72,64 100,56
           C128,64 130,86 124,100
           C152,114 162,148 162,196
           Z"
        fill="#040f09" stroke="#1d5b37" stroke-width="2"/>

  <!-- inner hood ridge -->
  <path d="M70,100 C66,82 72,62 100,54 C128,62 134,82 130,100"
        fill="none" stroke="#16472a" stroke-width="2"/>

  <!-- face cavity -->
  <ellipse cx="100" cy="108" rx="34" ry="38" fill="url(#faceGrad)"/>

  <!-- glowing eyes -->
  <g filter="url(#glow)">
    <rect x="83" y="104" width="10" height="14" rx="2" fill="#46ffa0"/>
    <rect x="107" y="104" width="10" height="14" rx="2" fill="#46ffa0"/>
  </g>

  <!-- terminal cursor "mouth" -->
  <rect x="92" y="132" width="16" height="5" rx="1" fill="#2c6b45" opacity="0.85"/>

</svg>
