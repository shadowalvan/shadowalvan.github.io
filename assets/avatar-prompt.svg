<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="terminal prompt mark avatar">
  <defs>
    <radialGradient id="bgGrad2" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#0d2417"/>
      <stop offset="100%" stop-color="#03100a"/>
    </radialGradient>
    <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="196" height="196" rx="40" fill="url(#bgGrad2)" stroke="#134a2c" stroke-width="2"/>

  <!-- corner brackets, matches the hero-frame motif on the site -->
  <g stroke="#46ffa0" stroke-width="3" opacity="0.65" fill="none">
    <path d="M22,46 L22,24 L44,24"/>
    <path d="M178,154 L178,176 L156,176"/>
  </g>

  <!-- chevron ">" -->
  <g filter="url(#glow2)">
    <polyline points="68,58 116,100 68,142" fill="none" stroke="#46ffa0" stroke-width="16"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- blinking cursor underscore -->
    <rect x="122" y="124" width="38" height="15" rx="3" fill="#46ffa0">
      <animate attributeName="opacity" values="1;1;0.15;0.15;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
